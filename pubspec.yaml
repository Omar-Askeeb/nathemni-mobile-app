name: nathemni
description: "نظمني - Nathemni: Personal Organization & Productivity App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  
  # State Management
  flutter_riverpod: ^2.4.9
  
  # Navigation
  go_router: ^13.0.0
  
  # Network & API
  dio: ^5.4.0
  pretty_dio_logger: ^1.3.1
  
  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2
  
  # Utils
  intl: ^0.20.2
  equatable: ^2.0.5
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  
  # UI Components
  flutter_spinkit: ^5.2.0
  fluttertoast: ^8.2.4
  
  # Local Database
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  
  # Connectivity
  connectivity_plus: ^5.0.2
  url_launcher: ^6.3.2
  mobile_scanner: ^7.1.4
  uuid: ^4.5.2

  # PDF Generation
  pdf: ^3.10.8
  printing: ^5.12.0
  path: ^1.8.3
  
  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.7

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter_native_splash:
  color: "#F7F9FA"
  image: assets/images/logo.png
  image_dark: assets/images/logo.png
  color_dark: "#0F172A"
  android: true
  ios: true
  fullscreen: true
  android_gravity: center
  ios_content_mode: scaleAspectFit
  android_12:
    color: "#F7F9FA"
    image: assets/images/logo.png
    icon_background_color: "#F7F9FA"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/logo.png
    - assets/images/logo_horizontal.png
    - assets/images/logo_vertical.png

  fonts:
    - family: Cairo
      fonts:
        - asset: fonts/Cairo-Regular.ttf
          weight: 400
        - asset: fonts/Cairo-Medium.ttf
          weight: 500
        - asset: fonts/Cairo-SemiBold.ttf
          weight: 600
        - asset: fonts/Cairo-Bold.ttf
          weight: 700
